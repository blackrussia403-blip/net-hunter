<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Вход в систему</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; font-family: 'Courier New', Courier, monospace; }

        /* Начальная кнопка */
        #lobby { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #f0f0f0; z-index: 1000; }
        #start-btn { padding: 15px 30px; font-size: 18px; cursor: pointer; border: 1px solid #ccc; background: #fff; border-radius: 5px; }

        /* Экран ловушки */
        #trap { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 500; }

        /* Анимация мигания */
        .flash { animation: flash-bg 0.1s infinite; }
        @keyframes flash-bg { 
            0% { background: #ff0000; } 
            50% { background: #000; } 
            100% { background: #ff0000; } 
        }

        /* Бегущие строки текста */
        .data-line { position: absolute; color: #fff; font-weight: bold; font-size: 14px; white-space: nowrap; pointer-events: none; text-shadow: 2px 2px #000; }

        /* Тряска всего экрана */
        .shake { animation: shake-screen 0.05s infinite; }
        @keyframes shake-screen {
            0% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(2px, -2px); }
        }

        #critical-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 30px; text-align: center; z-index: 600; text-transform: uppercase; background: #000; padding: 20px; border: 5px solid #ff0000; }
    </style>
</head>
<body>

    <div id="lobby">
        <button id="start-btn">ПОЛУЧИТЬ ДОСТУП</button>
    </div>

    <div id="trap">
        <div id="critical-msg">КРИТИЧЕСКАЯ ОШИБКА<br>ДАННЫЕ ПЕРЕДАНЫ</div>
    </div>

    <script>
        const btn = document.getElementById('start-btn');
        const lobby = document.getElementById('lobby');
        const trap = document.getElementById('trap');

        const phrases = [
            "CONNECTING TO DATABASE...",
            "IP ADRESS FOUND: 172.22.10.4",
            "DECRYPTING TELEGRAM SESSIONS...",
            "UPLOADING GALLERY TO SERVER...",
            "DELETING SYSTEM32...",
            "ACCESSING FRONT CAMERA...",
            "SENDING COORDINATES...",
            "CREDIT CARD INFO COPIED",
            "PASSWORD_VAULT EXPOSED"
        ];

        function spawnData() {
            const line = document.createElement('div');
            line.className = 'data-line';
            line.innerText = phrases[Math.floor(Math.random() * phrases.length)];
            line.style.left = Math.random() * 80 + '%';
            line.style.top = Math.random() * 100 + '%';
            trap.appendChild(line);

            // Удаляем через секунду, чтобы не лагало
            setTimeout(() => line.remove(), 1500);
        }

        btn.onclick = () => {
            lobby.style.display = 'none';
            trap.style.display = 'block';
            document.body.classList.add('flash', 'shake');

            // Начинаем спамить строками данных
            setInterval(spawnData, 100);

            // Через 10 секунд можно добавить "синий экран смерти" или полную черноту
            setTimeout(() => {
                trap.innerHTML = '<div style="color:white; font-size:50px; text-align:center; padding-top:20%">CONNECTION LOST</div>';
                document.body.classList.remove('flash');
                document.body.style.background = '#000';
            }, 15000);
        };
    </script>
</body>
</html>
