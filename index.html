<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MrsMajor Stable</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        #start-btn { padding: 30px 60px; background: #900; color: #fff; border: 4px solid #f00; font-size: 24px; font-weight: bold; cursor: pointer; box-shadow: 0 0 30px #f00; }
        .blood { position: absolute; top: -110%; width: 30px; background: linear-gradient(to bottom, transparent, #8a0303); z-index: 500; border-radius: 0 0 20px 20px; animation: drip 4s linear infinite; }
        @keyframes drip { to { top: 110%; } }
        .win { position: absolute; width: 220px; background: #ece9d8; border: 2px solid #0054e3; z-index: 1000; animation: shake 0.1s infinite; pointer-events: none; }
        .win-h { background: #0054e3; color: #fff; font-size: 11px; padding: 4px; font-weight: bold; }
        .win-b { padding: 15px; color: #000; font-size: 13px; text-align: center; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, 1px); } }
    </style>
</head>
<body>

<div id="start-screen"><button id="start-btn">START</button></div>
<div id="blood-container"></div>

<audio id="audio-player" loop preload="auto">
    <source src="https://myinstants.com" type="audio/mpeg">
</audio>

<script>
    const btn = document.getElementById('start-btn');
    const screen = document.getElementById('start-screen');
    const audio = document.getElementById('audio-player');
    const bloodBox = document.getElementById('blood-container');

    // Функция "пробуждения" аудио для мобилок
    function unlockAudio() {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const context = new AudioContext();
        const oscillator = context.createOscillator();
        const silent = context.createGain();
        silent.gain.value = 0;
        oscillator.connect(silent);
        silent.connect(context.destination);
        oscillator.start(0);
        oscillator.stop(0.1);
        if (context.state === 'suspended') context.resume();
    }

    function spawnBlood() {
        const d = document.createElement('div');
        d.className = 'blood';
        d.style.left = Math.random() * 100 + '%';
        d.style.height = (250 + Math.random() * 450) + 'px';
        bloodBox.appendChild(d);
        setTimeout(() => d.remove(), 4000);
    }

    function spawnWin() {
        const w = document.createElement('div');
        w.className = 'win';
        w.style.left = Math.random() * (window.innerWidth - 220) + 'px';
        w.style.top = Math.random() * (window.innerHeight - 100) + 'px';
        w.innerHTML = `<div class="win-h">Critical System Error</div><div class="win-b">Memory Corrupted...<br>MrsMajor Active</div>`;
        document.body.appendChild(w);
        setTimeout(() => w.remove(), 5000);
    }

    btn.onclick = () => {
        unlockAudio(); // Хак для снятия блокировки
        screen.style.display = 'none';
        
        audio.volume = 1.0;
        audio.play().catch(e => {
            console.log("Audio play failed:", e);
            // Если не сработало, пробуем еще раз при любом клике
            window.onclick = () => audio.play();
        });

        setInterval(spawnBlood, 400);
        setInterval(spawnWin, 700);
        
        // Цикл наливания фона кровью
        setInterval(() => {
            document.body.style.background = "#500";
            setTimeout(() => document.body.style.background = "#000", 2500);
        }, 6000);
    };
</script>

</body>
</html>
