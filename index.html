<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MRS. MAJOR 3.0 OFFICIAL</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; height: 100vh; touch-action: none; }
        
        /* Кровавые потеки на весь экран */
        #blood-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://giphy.com');
            background-size: cover; z-index: 1000; pointer-events: none; display: none; opacity: 0.7;
        }

        /* Лицо Mrs. Major с глитчем */
        .major-img {
            position: fixed; width: 100%; height: 100%; top: 0; left: 0;
            background: url('https://ibb.co') center/contain no-repeat;
            z-index: 500; display: none; filter: contrast(2) brightness(0.5) sepia(1) hue-rotate(-50deg);
            animation: shake 0.05s infinite;
        }
        @keyframes shake { 0% { transform: translate(5px, 5px); } 50% { transform: translate(-5px, -5px); } 100% { transform: translate(5px, -5px); } }

        #start {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #900; color: #fff; border: 4px solid #fff; padding: 40px;
            font-size: 24px; font-weight: 900; cursor: pointer; z-index: 2000; box-shadow: 0 0 50px red;
        }
    </style>
</head>
<body>

    <div id="blood-overlay"></div>
    <div class="major-img" id="face"></div>
    
    <button id="start" onclick="startInfection()">АКТИВИРОВАТЬ</button>

    <!-- Тот самый звук "Song of Unhealing" из YouTube -->
    <audio id="scary-audio" loop>
        <source src="https://myinstants.com" type="audio/mpeg">
    </audio>

    <script>
        function startInfection() {
            document.getElementById('start').style.display = 'none';
            document.getElementById('face').style.display = 'block';
            document.getElementById('blood-overlay').style.display = 'block';
            
            const audio = document.getElementById('scary-audio');
            audio.play().catch(e => console.log("Ошибка звука: включи громкость!"));

            // Вибрация
            setInterval(() => {
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            }, 500);
        }
    </script>
</body>
</html>
