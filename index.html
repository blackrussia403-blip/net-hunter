<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MRS. MAJOR ORIGINAL</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; height: 100vh; font-family: 'Courier New', monospace; touch-action: none; }
        #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f00; z-index: 1000; display: none; pointer-events: none; }
        .major { position: fixed; width: 100%; height: 100%; background: url('https://ibb.co') center/contain no-repeat; z-index: 500; display: none; filter: invert(1); animation: m 0.05s infinite; }
        @keyframes m { 0% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.2) rotate(5deg) translate(10px, -10px); } 100% { transform: scale(0.9) rotate(-5deg); } }
        .msg { position: fixed; background: #f00; color: #fff; font-weight: 900; font-size: 24px; padding: 5px; z-index: 1500; white-space: nowrap; pointer-events: none; text-shadow: 2px 2px #000; }
        #start { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #f00; color: #000; border: none; padding: 50px; font-size: 2rem; font-weight: 900; cursor: pointer; z-index: 5000; box-shadow: 0 0 100px red; border-radius: 20px; }
    </style>
</head>
<body>
    <div id="flash"></div>
    <div class="major" id="major"></div>
    <button id="start" onclick="go()">START INFECTION</button>

    <script>
        function go() {
            document.getElementById('start').style.display = 'none';
            document.getElementById('major').style.display = 'block';
            const f = document.getElementById('flash');
            f.style.display = 'block';

            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            
            // ТА САМАЯ МЕЛОДИЯ (АДСКИЙ ЦИРК)
            const melody = [261, 329, 392, 523, 493, 392, 329, 261, 220, 261, 329, 440, 415, 329, 261, 220];
            let n = 0;

            setInterval(() => {
                // Синтезируем жуткий 8-бит звук
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.type = 'square';
                o.frequency.setValueAtTime(melody[n % melody.length], ctx.currentTime);
                g.gain.setTargetAtTime(0.1, ctx.currentTime, 0.05);
                o.connect(g); g.connect(ctx.destination);
                o.start(); o.stop(ctx.currentTime + 0.1);
                n++;

                // Бешеное мигание
                f.style.opacity = Math.random() > 0.5 ? 0.8 : 0;
                
                if (navigator.vibrate) navigator.vibrate(50);
                
                spawnMsg();
            }, 120);
        }

        function spawnMsg() {
            const m = document.createElement('div');
            m.className = 'msg';
            const t = ["DIE", "MRS. MAJOR", "NO ESCAPE", "HA-HA-HA", "INFECTED", "666", "SYSTEM DEAD"];
            m.innerText = t[Math.floor(Math.random() * t.length)];
            m.style.left = Math.random() * 100 + "%";
            m.style.top = Math.random() * 100 + "%";
            m.style.transform = `rotate(${Math.random() * 360}deg)`;
            document.body.appendChild(m);
            setTimeout(() => m.remove(), 400); // Быстро исчезают, как в оригинале
        }
    </script>
</body>
</html>
