<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MrsMajor Visual Horror Experience</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; overflow: hidden; font-family: "Tahoma", sans-serif;
            user-select: none;
        }

        /* Слой крови */
        #bloodCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; pointer-events: none;
        }

        /* Глитч-эффект на весь экран */
        .glitch-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://giphy.com');
            opacity: 0.1; z-index: 1; pointer-events: none;
        }

        /* Окна Windows XP */
        .xp-window {
            position: absolute; width: 350px; 
            background: #ece9d8; border: 2px solid #0054e3;
            border-top-left-radius: 4px; border-top-right-radius: 4px;
            box-shadow: 15px 15px 30px rgba(0,0,0,0.7);
            z-index: 100; animation: shake 0.1s infinite;
        }

        .title-bar {
            background: linear-gradient(180deg, #0054e3 0%, #27c1ff 100%);
            color: white; padding: 4px 10px; font-weight: bold; font-size: 13px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .content {
            padding: 20px; color: #000; text-align: center;
            border-bottom: 1px solid #999;
        }

        .error-icon {
            width: 40px; height: 40px; background: red; color: white;
            border-radius: 50%; display: inline-block; line-height: 40px;
            font-size: 30px; font-weight: bold; margin-bottom: 10px;
        }

        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            50% { transform: translate(-1px, -2px) rotate(-1deg); }
            100% { transform: translate(1px, 2px) rotate(1deg); }
        }

        #overlay-text {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ff0000; font-size: 40px; font-weight: bold; 
            z-index: 10000; cursor: pointer; text-shadow: 0 0 20px red;
        }
    </style>
</head>
<body>

<div id="overlay-text">RUN MRSMAJOR.EXE</div>
<div class="glitch-layer"></div>
<canvas id="bloodCanvas"></canvas>

<audio id="bgm" loop>
    <source src="https://myinstants.com" type="audio/mpeg">
</audio>

<script>
    const canvas = document.getElementById('bloodCanvas');
    const ctx = canvas.getContext('2d');
    const bgm = document.getElementById('bgm');
    const overlay = document.getElementById('overlay-text');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let drops = [];

    function initBlood() {
        for(let i = 0; i < 80; i++) {
            drops.push({
                x: Math.random() * canvas.width,
                y: -Math.random() * 500,
                speed: 1 + Math.random() * 4,
                w: 15 + Math.random() * 30
            });
        }
    }

    function animateBlood() {
        ctx.fillStyle = 'rgba(150, 0, 0, 0.6)';
        drops.forEach(d => {
            // Рисуем подтек
            ctx.fillRect(d.x, 0, d.w, d.y);
            // Капля на конце
            ctx.beginPath();
            ctx.arc(d.x + d.w/2, d.y, d.w/1.2, 0, Math.PI*2);
            ctx.fill();

            d.y += d.speed;
            if(d.y > canvas.height + 100) d.y = -100;
        });
        requestAnimationFrame(animateBlood);
    }

    function createWin() {
        const win = document.createElement('div');
        win.className = 'xp-window';
        win.style.left = Math.random() * (window.innerWidth - 300) + 'px';
        win.style.top = Math.random() * (window.innerHeight - 200) + 'px';
        
        win.innerHTML = `
            <div class="title-bar"><span>System Error</span><span style="border:1px solid #fff; padding:0 3px;">X</span></div>
            <div class="content">
                <div class="error-icon">X</div>
                <p><b>Fatal Error!</b></p>
                <p>Memory could not be read.</p>
            </div>
        `;
        document.body.appendChild(win);

        // Авто-удаление старых окон, чтобы браузер не вылетел сразу (лимит 100 окон)
        const allWins = document.querySelectorAll('.xp-window');
        if(allWins.length > 100) allWins[0].remove();
    }

    document.addEventListener('click', () => {
        overlay.style.display = 'none';
        bgm.play();
        initBlood();
        animateBlood();
        
        // Массивный спам окон
        setInterval(createWin, 200); 
        
        // Эффект ускорения через 15 секунд
        setTimeout(() => {
            setInterval(createWin, 50);
            document.body.style.filter = "invert(1) contrast(2)";
        }, 15000);
        
    }, { once: true });

    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
</script>

</body>
</html>
