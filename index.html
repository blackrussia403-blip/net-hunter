<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Доступ к системе</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #fff; overflow: hidden; font-family: 'Courier New', Courier, monospace; user-select: none; }

        /* Шаг 1: Приманка */
        #lobby { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #f5f5f5; z-index: 1000; }
        #start-btn { padding: 20px 40px; font-size: 20px; cursor: pointer; border: 2px solid #000; background: #fff; font-weight: bold; }

        /* Шаг 2: Таймер и Матрица */
        #hacker-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 500; }
        #timer-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #0f0; text-align: center; font-size: 24px; z-index: 600; }
        #seconds { font-size: 50px; display: block; color: #f00; font-weight: bold; margin-top: 10px; }

        /* Эффект Матрицы */
        .matrix-line { position: absolute; color: #0f0; font-size: 14px; white-space: nowrap; pointer-events: none; animation: move-down 4s linear forwards; opacity: 0.8; text-shadow: 0 0 5px #0f0; }
        @keyframes move-down { 0% { top: -50px; } 100% { top: 110%; } }

        /* Шаг 3: Финал с твоим глазом */
        #final-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 2000; 
        }
        
        #eye-img {
            width: 100%; height: 100%; object-fit: contain;
            /* Твоё фото глаза вшито прямо в код */

            background-size: contain;
        }

        #final-msg { 
            position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%);
            width: 80%; background: rgba(0, 0, 0, 0.9); border: 2px solid #f00; 
            color: #f00; padding: 15px; text-align: center; font-size: 16px; 
            font-weight: bold; box-shadow: 0 0 15px #f00; text-transform: uppercase;
        }

</head>
<body>

    <!-- Начало -->
    <div id="lobby">
        <button id="start-btn">ПОЛУЧИТЬ ДОСТУП</button>
    </div>

    <!-- Процесс -->
    <div id="hacker-screen">
        <div id="timer-box">
            ИНИЦИАЛИЗАЦИЯ ВЗЛОМА...
            <span id="seconds">5</span>
        </div>
    </div>

    <!-- Результат -->
    <div id="final-screen">
        <div id="eye-img"></div>
        <div id="final-msg">
            ТЕЛЕФОН ПЕРЕДАЛ ДАННЫЕ В КОМАНДНЫЙ ЦЕНТР ПОЛЬЗОВАТЕЛЯ ISLAM_GIGAEV
        </div>
    </div>

    <script>
        const btn = document.getElementById('start-btn');
        const lobby = document.getElementById('lobby');
        const h_screen = document.getElementById('hacker-screen');
        const secondsSpan = document.getElementById('seconds');
        const finalScreen = document.getElementById('final-screen');

        const dataStrings = [
            "DECRYPTING TG_SESSION...",
            "IP: 192.168.0.1 [FOUND]",
            "UPLOADING GALLERY...",
            "ACCESSING CONTACTS...",
            "PASSWORDS_DATABASE EXPOSED",
            "LOCATION: [COORDINATES FOUND]",
            "SENDING DATA TO SERVER..."
        ];

        function spawnMatrixLine() {
            const line = document.createElement('div');
            line.className = 'matrix-line';
            line.innerText = dataStrings[Math.floor(Math.random() * dataStrings.length)];
            line.style.left = Math.random() * 85 + '%';
            h_screen.appendChild(line);
            setTimeout(() => line.remove(), 4000);
        }

        btn.onclick = () => {
            lobby.style.display = 'none';
            h_screen.style.display = 'block';

            let timeLeft = 5;
            const timer = setInterval(() => {
                timeLeft--;
                secondsSpan.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    startTheShow();
                }
            }, 1000);
        };

        function startTheShow() {
            document.getElementById('timer-box').style.display = 'none';
            
            // Запуск Матрицы
            const matrixInterval = setInterval(spawnMatrixLine, 120);

            // Финал через 4 секунды Матрицы
            setTimeout(() => {
                clearInterval(matrixInterval);
                h_screen.style.display = 'none';
                finalScreen.style.display = 'block';
            }, 4000);
        }
    </script>
</body>
</html>
