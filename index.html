<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Доступ к системе</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #fff; overflow: hidden; font-family: monospace; }
        #lobby { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #eee; z-index: 10; }
        button { padding: 20px 40px; font-size: 20px; font-weight: bold; cursor: pointer; }
        
        #hacker { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #0f0; z-index: 5; }
        #timer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; font-size: 24px; }
        #num { font-size: 60px; color: red; display: block; }
        
        .line { position: absolute; white-space: nowrap; animation: fall 4s linear forwards; opacity: 0.7; }
        @keyframes fall { from { top: -50px; } to { top: 110%; } }

        #final { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 20; color: red; text-align: center; }
        #final-text { position: absolute; bottom: 10%; width: 100%; font-size: 18px; font-weight: bold; text-transform: uppercase; padding: 10px; border: 2px solid red; background: rgba(0,0,0,0.8); }
        #eye { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 100px; border-radius: 50% / 100%; background: radial-gradient(circle, #000 20%, #fff 21%, #fff 40%, #000 41%); box-shadow: 0 0 50px red; }
    </style>
</head>
<body>

    <div id="lobby"><button onclick="start()">ПОЛУЧИТЬ ДОСТУП</button></div>

    <div id="hacker">
        <div id="timer">ЗАГРУЗКА...<span id="num">5</span></div>
    </div>

    <div id="final">
        <div id="eye"></div>
        <div id="final-text">ТЕЛЕФОН ПЕРЕДАЛ ДАННЫЕ В КОМАНДНЫЙ ЦЕНТР ПОЛЬЗОВАТЕЛЯ ISLAM_GIGAEV</div>
    </div>

    <script>
        function start() {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('hacker').style.display = 'block';
            let t = 5;
            let it = setInterval(() => {
                t--;
                document.getElementById('num').innerText = t;
                if(t <= 0) {
                    clearInterval(it);
                    runMatrix();
                }
            }, 1000);
        }

        function runMatrix() {
            document.getElementById('timer').style.display = 'none';
            let m = setInterval(() => {
                let l = document.createElement('div');
                l.className = 'line';
                l.style.left = Math.random() * 90 + '%';
                l.innerText = "DECRYPTING_DATA_IP_FOUND_UPLOADING...";
                document.getElementById('hacker').appendChild(l);
                setTimeout(() => l.remove(), 4000);
            }, 150);

            setTimeout(() => {
                clearInterval(m);
                document.getElementById('hacker').style.display = 'none';
                document.getElementById('final').style.display = 'block';
            }, 4000);
        }
    </script>
</body>
</html>
