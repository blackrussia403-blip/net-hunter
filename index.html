<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MrsMajor Mobile FINAL</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; transition: background 0.5s; }
        
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        #start-btn { padding: 20px 40px; background: #800; color: #fff; border: 3px solid #f00; font-size: 20px; font-weight: bold; cursor: pointer; }

        /* Капли крови */
        .blood-drip { position: absolute; top: -100px; width: 25px; background: #8a0303; border-radius: 0 0 15px 15px; z-index: 500; animation: drip 3s linear infinite; box-shadow: 0 0 10px #400; }
        @keyframes drip { to { top: 110%; } }

        /* Окна */
        .win { position: absolute; width: 180px; background: #ece9d8; border: 2px solid #0054e3; z-index: 1000; animation: shake 0.1s infinite, fadeOut 4s forwards; pointer-events: none; }
        .win-header { background: #0054e3; color: #fff; font-size: 10px; padding: 2px 5px; }
        .win-body { padding: 10px; color: #000; font-size: 11px; text-align: center; font-weight: bold; }

        @keyframes shake { 0%, 100% { transform: translate(1px,1px); } 50% { transform: translate(-1px,-1px); } }
        @keyframes fadeOut { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }

        /* Эффект покраснения фона */
        .red-flash { background: radial-gradient(circle, #400 0%, #000 100%) !important; }
    </style>
</head>
<body>

<div id="start-overlay"><button id="start-btn">CLICK TO START</button></div>
<div id="blood-container"></div>

<!-- Прямая ссылка на MP3 -->
<audio id="horror-audio" loop>
    <source src="https://catbox.moe" type="audio/mpeg">
</audio>

<script>
    const btn = document.getElementById('start-btn');
    const overlay = document.getElementById('start-overlay');
    const audio = document.getElementById('horror-audio');
    const bloodCont = document.getElementById('blood-container');

    function spawnBlood() {
        const d = document.createElement('div');
        d.className = 'blood-drip';
        d.style.left = Math.random() * 100 + '%';
        d.style.height = (100 + Math.random() * 300) + 'px';
        d.style.width = (15 + Math.random() * 20) + 'px';
        bloodCont.appendChild(d);
        setTimeout(() => d.remove(), 3500);
    }

    function spawnWin() {
        const w = document.createElement('div');
        w.className = 'win';
        w.style.left = Math.random() * (window.innerWidth - 180) + 'px';
        w.style.top = Math.random() * (window.innerHeight - 80) + 'px';
        w.innerHTML = `<div class="win-header">Fatal Error</div><div class="win-body">0x000666<br>Corrupted</div>`;
        document.body.appendChild(w);
        setTimeout(() => w.remove(), 4000);
    }

    // Цикл покраснения экрана (раз в 5 секунд)
    function pulseScreen() {
        document.body.style.background = "#800";
        setTimeout(() => {
            document.body.style.background = "#000";
        }, 1500); 
    }

    btn.onclick = () => {
        overlay.style.display = 'none';
        
        // Попытка запустить аудио
        audio.currentTime = 0;
        audio.volume = 1.0;
        var playPromise = audio.play();

        if (playPromise !== undefined) {
            playPromise.catch(error => {
                console.log("Автозапуск заблокирован. Нужно взаимодействие.");
            });
        }

        setInterval(spawnBlood, 400);
        setInterval(spawnWin, 600);
        setInterval(pulseScreen, 5000);
    };
</script>

</body>
</html>
