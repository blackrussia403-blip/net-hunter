<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Доступ к системе</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #fff; overflow: hidden; font-family: 'Courier New', Courier, monospace; }

        /* Шаг 1: Приманка */
        #lobby { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #f5f5f5; z-index: 1000; }
        #start-btn { padding: 20px 40px; font-size: 20px; cursor: pointer; border: 2px solid #000; background: #fff; font-weight: bold; transition: 0.3s; }
        #start-btn:active { background: #eee; }

        /* Шаг 2: Таймер и Матрица */
        #hacker-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 500; }
        #timer-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #0f0; text-align: center; font-size: 24px; z-index: 600; }
        #seconds { font-size: 50px; display: block; color: #ff0000; font-weight: bold; }

        .matrix-line { position: absolute; color: #0f0; font-size: 14px; white-space: nowrap; pointer-events: none; animation: move-down 5s linear forwards; opacity: 0.8; }
        @keyframes move-down { 0% { top: -20px; } 100% { top: 110%; } }

        /* Шаг 3: Финал с глазом */
        #final-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000 url('https://ibb.co') no-repeat center center; 
            background-size: contain; z-index: 2000; 
        }
        #final-msg { 
            position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%);
            width: 85%; background: rgba(0, 0, 0, 0.8); border: 2px solid #f00; 
            color: #f00; padding: 20px; text-align: center; font-size: 18px; 
            font-weight: bold; box-shadow: 0 0 15px #f00; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="lobby">
        <button id="start-btn">ПОЛУЧИТЬ ДОСТУП</button>
    </div>

    <div id="hacker-screen">
        <div id="timer-box">
            ЗАГРУЗКА ДАННЫХ...
            <span id="seconds">5</span>
        </div>
    </div>

    <div id="final-screen">
        <div id="final-msg">
            ТЕЛЕФОН ПЕРЕДАЛ ДАННЫЕ В КОМАНДНЫЙ ЦЕНТР ПОЛЬЗОВАТЕЛЯ ISLAM_GIGAEV
        </div>
    </div>

    <script>
        const btn = document.getElementById('start-btn');
        const lobby = document.getElementById('lobby');
        const h_screen = document.getElementById('hacker-screen');
        const secondsSpan = document.getElementById('seconds');
        const finalScreen = document.getElementById('final-screen');

        const dataStrings = [
            "GET /auth/telegram_session HTTP/1.1",
            "IP: 188.162.3.44 [LOCATION FOUND]",
            "DECRYPTING RSA_KEY_2048...",
            "CONTACTS_LIST_UPLOADING...",
            "GALLERY_BACKUP_INITIATED",
            "SYSTEM_LOG_ACCESS_GRANTED",
            "UPLOADING TO REMOTE_STORAGE...",
            "DEVICE_ID: 88AF-992C-001"
        ];

        function spawnMatrixLine() {
            const line = document.createElement('div');
            line.className = 'matrix-line';
            line.innerText = dataStrings[Math.floor(Math.random() * dataStrings.length)];
            line.style.left = Math.random() * 90 + '%';
            h_screen.appendChild(line);
            setTimeout(() => line.remove(), 5000);
        }

        btn.onclick = () => {
            lobby.style.display = 'none';
            h_screen.style.display = 'block';

            let timeLeft = 5;
            const timer = setInterval(() => {
                timeLeft--;
                secondsSpan.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    startMatrix();
                }
            }, 1000);
        };

        function startMatrix() {
            document.getElementById('timer-box').style.display = 'none';
            const matrixInterval = setInterval(spawnMatrixLine, 100);

            setTimeout(() => {
                clearInterval(matrixInterval);
                h_screen.style.display = 'none';
                finalScreen.style.display = 'block';
            }, 4000); // 4 секунды идет матрица
        }
    </script>
</body>
</html>
