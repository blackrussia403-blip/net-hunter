<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MrsMajor Visual Test</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; overflow: hidden; font-family: "Tahoma", sans-serif;
        }

        /* Кнопка запуска (обязательна для браузера) */
        #btn-start {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; background: #8a0303; color: white;
            border: 2px solid #fff; font-size: 20px; cursor: pointer; z-index: 10000;
            box-shadow: 0 0 20px red; text-transform: uppercase;
        }

        #bloodCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000; pointer-events: none;
        }

        .xp-window {
            position: absolute; width: 300px; height: 150px;
            background: #ece9d8; border: 2px solid #0054e3;
            border-top-left-radius: 4px; border-top-right-radius: 4px;
            z-index: 100; animation: shake 0.1s infinite;
        }

        .title-bar {
            background: linear-gradient(180deg, #0054e3 0%, #27c1ff 100%);
            color: white; padding: 3px 8px; font-weight: bold; font-size: 12px;
            display: flex; justify-content: space-between;
        }

        .content { padding: 15px; color: #000; text-align: center; font-weight: bold; }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, 1px); }
        }
    </style>
</head>
<body>

    <button id="btn-start">START MRSMAJOR.EXE</button>
    <canvas id="bloodCanvas"></canvas>

    <audio id="bgm" loop>
        <source src="https://myinstants.com" type="audio/mpeg">
    </audio>

    <script>
        const btn = document.getElementById('btn-start');
        const canvas = document.getElementById('bloodCanvas');
        const ctx = canvas.getContext('2d');
        const bgm = document.getElementById('bgm');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let drops = [];

        function initBlood() {
            for(let i = 0; i < 40; i++) {
                drops.push({
                    x: Math.random() * canvas.width,
                    y: 0,
                    speed: 1 + Math.random() * 3,
                    w: 10 + Math.random() * 20
                });
            }
        }

        function draw() {
            ctx.fillStyle = 'rgba(138, 3, 3, 0.5)';
            drops.forEach(d => {
                ctx.fillRect(d.x, 0, d.w, d.y); // Рисуем полосу крови
                ctx.beginPath();
                ctx.arc(d.x + d.w/2, d.y, d.w/1.1, 0, Math.PI*2);
                ctx.fill();
                d.y += d.speed;
                if(d.y > canvas.height + 50) d.y = -20;
            });
            requestAnimationFrame(draw);
        }

        function spawnWindow() {
            const win = document.createElement('div');
            win.className = 'xp-window';
            win.style.left = Math.random() * (window.innerWidth - 300) + 'px';
            win.style.top = Math.random() * (window.innerHeight - 150) + 'px';
            win.innerHTML = `
                <div class="title-bar"><span>Critical Error</span><span>[X]</span></div>
                <div class="content"><p>SYSTEM FAILURE</p><p>MrsMajor.exe active</p></div>
            `;
            document.body.appendChild(win);
            
            // Чтобы не лагало, удаляем старые через 5 секунд
            setTimeout(() => win.remove(), 5000);
        }

        btn.onclick = () => {
            btn.style.display = 'none';
            bgm.play().catch(() => console.log("Звук заблокирован"));
            initBlood();
            draw();
            setInterval(spawnWindow, 300);
        };
    </script>
</body>
</html>
