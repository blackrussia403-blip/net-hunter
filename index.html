<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MrsMajor Visual Simulation</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; overflow: hidden; font-family: "Tahoma", sans-serif;
        }

        /* Слой с помехами (Глитч) */
        #glitch-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://giphy.com');
            opacity: 0.15; pointer-events: none; z-index: 5;
        }

        /* Слой для отрисовки крови */
        #bloodCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000; pointer-events: none;
        }

        /* Стилизация окон Windows XP */
        .window {
            position: absolute; width: 320px; height: 160px;
            background: #ece9d8; border: 2px solid #0054e3;
            border-top-left-radius: 4px; border-top-right-radius: 4px;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.6);
            z-index: 10; animation: shake 0.2s infinite;
        }

        .title-bar {
            background: linear-gradient(180deg, #0054e3 0%, #27c1ff 100%);
            color: white; padding: 3px 8px; font-weight: bold; font-size: 13px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .window-content {
            padding: 15px; color: #000; text-align: center; font-size: 14px;
        }

        .error-icon {
            color: red; font-size: 30px; font-weight: bold; margin-bottom: 10px;
        }

        /* Анимация тряски окон */
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -2px); }
            100% { transform: translate(1px, 1px); }
        }

        /* Инструкция в центре */
        #start-hint {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #8a0303; font-size: 24px; text-transform: uppercase;
            letter-spacing: 5px; cursor: pointer; z-index: 2000;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="start-hint">CLICK TO RUN MrsMajor.exe</div>
    <div id="glitch-overlay"></div>
    <canvas id="bloodCanvas"></canvas>

    <!-- Музыка: Song of Unhealing (MrsMajor BGM) -->
    <audio id="bgm" loop>
        <source src="https://myinstants.com" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('bloodCanvas');
        const ctx = canvas.getContext('2d');
        const bgm = document.getElementById('bgm');
        const hint = document.getElementById('start-hint');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Настройки крови
        let bloodDrops = [];
        function initBlood() {
            for(let i = 0; i < 60; i++) {
                bloodDrops.push({
                    x: Math.random() * canvas.width,
                    y: -Math.random() * 200,
                    speed: 0.5 + Math.random() * 2,
                    radius: 15 + Math.random() * 25
                });
            }
        }

        function drawBlood() {
            ctx.fillStyle = 'rgba(120, 0, 0, 0.4)';
            bloodDrops.forEach(drop => {
                // Рисуем "подтек"
                ctx.fillRect(drop.x - drop.radius/2, 0, drop.radius, drop.y);
                // Рисуем каплю
                ctx.beginPath();
                ctx.arc(drop.x, drop.y, drop.radius, 0, Math.PI * 2);
                ctx.fill();

                drop.y += drop.speed;
                // Когда капля доходит до низа, она не исчезает, а "накапливается"
                if (drop.y > canvas.height + 50) {
                    drop.y = -50;
                    drop.speed += 0.1; // Ускоряем поток
                }
            });
            requestAnimationFrame(drawBlood);
        }

        // Функция создания окон ошибок
        function spawnWindow() {
            const win = document.createElement('div');
            win.className = 'window';
            
            // Случайная позиция
            const x = Math.random() * (window.innerWidth - 320);
            const y = Math.random() * (window.innerHeight - 160);
            win.style.left = x + 'px';
            win.style.top = y + 'px';
            
            // Наполнение окна
            win.innerHTML = `
                <div class="title-bar">
                    <span>Critical Error: 0x666</span>
                    <span style="background: #e04343; padding: 0 5px; border: 1px solid white;">X</span>
                </div>
                <div class="window-content">
                    <div class="error-icon">X</div>
                    <p>Your system is bleeding...</p>
                    <p>Mrs. Major is here.</p>
                </div>
            `;
            
            document.body.appendChild(win);
        }

        // Запуск всего процесса
        document.addEventListener('click', () => {
            hint.style.display = 'none'; // Убираем надпись
            bgm.volume = 0.7;
            bgm.play();
            
            initBlood();
            drawBlood();
            
            // Спамим окнами каждые 300мс
            setInterval(spawnWindow, 350);
            
            // Через 10 секунд увеличиваем скорость спама
            setTimeout(() => {
                setInterval(spawnWindow, 150);
            }, 10000);

        }, { once: true });

        // Ресайз канваса при изменении окна
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
