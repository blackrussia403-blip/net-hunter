<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL CRITICAL FAILURE</title>
    <style>
        body { background: #000; color: #f00; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Эффект помех и крови */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 0, 0, 0.1); pointer-events: none; z-index: 1000; display: none; animation: flash 0.1s infinite; }
        @keyframes flash { 0% { opacity: 0.1; } 50% { opacity: 0.3; } 100% { opacity: 0.1; } }

        /* Глитч заголовок */
        .glitch-mega { font-size: 3rem; font-weight: bold; text-align: center; display: none; z-index: 100; text-shadow: 3px 3px #0ff, -3px -3px #f0f; animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(2px, -2px); } }

        .win { position: absolute; background: #000; border: 2px solid #f00; color: #fff; padding: 10px; font-size: 12px; box-shadow: 0 0 20px #f00; z-index: 50; width: 220px; }
        .win-h { background: #f00; color: #000; font-weight: bold; padding: 2px 5px; margin: -10px -10px 10px -10px; }

        #btn { background: #f00; color: #000; border: none; padding: 30px 60px; font-size: 1.8rem; font-weight: bold; cursor: pointer; box-shadow: 0 0 50px #f00; z-index: 200; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="overlay" id="blood"></div>
    <button id="btn" onclick="hack()">ИНИЦИИРОВАТЬ ВЗЛОМ</button>
    <div id="msg" class="glitch-mega">USER DATA LEAKED</div>

    <script>
        function hack() {
            document.getElementById('btn').style.display = 'none';
            document.getElementById('msg').style.display = 'block';
            document.getElementById('blood').style.display = 'block';
            
            // Звук (синтезируем писк, так как файл загружать долго)
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            setInterval(() => {
                const osc = audioCtx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(Math.random() * 400 + 100, audioCtx.currentTime);
                osc.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
                
                // Вибрация (работает на Android)
                if (navigator.vibrate) navigator.vibrate(50);
                
                makeWin();
            }, 300);
        }

        function makeWin() {
            const w = document.createElement('div');
            w.className = 'win';
            w.style.left = Math.random() * (window.innerWidth - 220) + 'px';
            w.style.top = Math.random() * (window.innerHeight - 100) + 'px';
            
            const list = [
                "КОПИРОВАНИЕ ПАРОЛЕЙ GOOGLE...",
                "ДОСТУП К TELEGRAM: ПОЛУЧЕН",
                "ПЕРЕХВАТ СМС-СООБЩЕНИЙ...",
                "ВЗЛОМ ПРИЛОЖЕНИЙ БАНКА...",
                "ЗАГРУЗКА ФОТО ИЗ ГАЛЕРЕИ...",
                "МЕСТОПОЛОЖЕНИЕ ОПРЕДЕЛЕНО",
                "УДАЛЕНИЕ ВСЕХ КОНТАКТОВ...",
                "IP АДРЕС: ОТСЛЕЖИВАЕТСЯ"
            ];
            
            w.innerHTML = `<div class="win-h">ВНИМАНИЕ!</div>${list[Math.floor(Math.random() * list.length)]}`;
            document.body.appendChild(w);
            setTimeout(() => w.remove(), 5000);
        }
    </script>
</body>
</html>
