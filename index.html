<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MRS. MAJOR EXTREME</title>
    <style>
        body { background: #000; color: #f00; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; height: 100vh; touch-action: none; }
        
        /* Заливка кровью */
        .blood-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f00; opacity: 0; pointer-events: none; z-index: 1000; display: none; }

        /* Маска Mrs. Major */
        .major-face {
            position: fixed; width: 80%; height: 80%; top: 10%; left: 10%;
            background: url('https://ibb.co') no-repeat center;
            background-size: contain;
            filter: drop-shadow(0 0 50px red) invert(1);
            display: none; z-index: 50;
            animation: glitch-face 0.05s infinite;
        }

        @keyframes glitch-face {
            0% { transform: scale(1); filter: invert(1) hue-rotate(0deg); }
            50% { transform: scale(1.1) translate(10px, -10px); filter: invert(0) hue-rotate(90deg); }
            100% { transform: scale(0.9) translate(-10px, 10px); filter: invert(1) hue-rotate(180deg); }
        }

        /* Летающий чат */
        .chat-line { position: fixed; white-space: nowrap; font-weight: 900; font-size: 20px; color: #fff; background: #f00; padding: 2px 10px; z-index: 200; pointer-events: none; }

        #btn { background: #f00; color: #000; border: none; padding: 40px; font-size: 2rem; font-weight: 900; cursor: pointer; box-shadow: 0 0 100px #f00; z-index: 3000; border-radius: 50%; }
    </style>
</head>
<body>

    <div class="blood-flash" id="blood"></div>
    <div class="major-face" id="face"></div>
    
    <div style="display:flex; justify-content:center; align-items:center; height:100vh;">
        <button id="btn" onclick="startNightmare()">ИНИЦИИРОВАТЬ</button>
    </div>

    <script>
        function startNightmare() {
            document.getElementById('btn').style.display = 'none';
            document.getElementById('face').style.display = 'block';
            const blood = document.getElementById('blood');
            blood.style.display = 'block';

            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Мелодия Mrs. Major (упрощенная 8-бит версия)
            let notes = [440, 466, 440, 349, 440, 466, 523, 440];
            let i = 0;

            setInterval(() => {
                // Играем ноту
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(notes[i % notes.length], ctx.currentTime);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.15);
                i++;

                // Вспышки крови
                blood.style.opacity = Math.random() > 0.5 ? 0.3 : 0;
                
                // Вибрация
                if (navigator.vibrate) navigator.vibrate(100);
                
                spawnChat();
            }, 150);
        }

        function spawnChat() {
            const line = document.createElement('div');
            line.className = 'chat-line';
            const msgs = ["YOU CANNOT RUN", "MRS. MAJOR IS HERE", "SYSTEM DESTROYED", "HA-HA-HA-HA", "FILES CORRUPTED", "ACCESS DENIED", "DIE DIE DIE"];
            line.innerText = msgs[Math.floor(Math.random() * msgs.length)];
            line.style.left = "-200px";
            line.style.top = Math.random() * 90 + "vh";
            document.body.appendChild(line);

            // Анимация полета чата
            let pos = -200;
            const anim = setInterval(() => {
                pos += 20;
                line.style.left = pos + "px";
                if (pos > window.innerWidth) {
                    clearInterval(anim);
                    line.remove();
                }
            }, 20);
        }
    </script>
</body>
</html>
