<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MRS MAJOR ULTIMATE</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; height: 100vh; font-family: 'Tahoma', sans-serif; }
        /* Эффект стекающей крови */
        #blood { position: fixed; top: -100%; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, transparent, #f00, #700); z-index: 100; pointer-events: none; transition: top 20s linear; }
        /* Окна Windows XP */
        .win { position: absolute; width: 200px; background: #ece9d8; border: 2px solid #0054e3; box-shadow: 3px 3px 10px #000; z-index: 500; }
        .head { background: linear-gradient(90deg, #0054e3, #27c4fb); color: #fff; padding: 2px 5px; font-size: 11px; font-weight: bold; display: flex; justify-content: space-between; }
        .body { padding: 10px; color: #000; text-align: center; font-size: 13px; font-weight: bold; }
        .major { position: fixed; width: 80%; top: 10%; left: 10%; filter: invert(1) brightness(0.5); z-index: 50; display: none; animation: s 0.05s infinite; }
        @keyframes s { 0% { transform: translate(5px,5px); } 50% { transform: translate(-5px,-5px); } }
        #btn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #f00; color: #fff; border: 4px solid #fff; padding: 30px; font-size: 20px; font-weight: 900; cursor: pointer; z-index: 2000; }
    </style>
</head>
<body>
    <div id="blood"></div>
    <img src="https://ibb.co" class="major" id="m">
    <button id="btn" onclick="go()">START INFECTION</button>

    <script>
        function go() {
            document.getElementById('btn').style.display = 'none';
            document.getElementById('m').style.display = 'block';
            document.getElementById('blood').style.top = '0'; // Кровь потекла вниз

            const audio = new (window.AudioContext || window.webkitAudioContext)();
            
            // ТА САМАЯ МЕЛОДИЯ (Song of Unhealing)
            const notes =; 
            let n = 0;

            setInterval(() => {
                const o = audio.createOscillator();
                const g = audio.createGain();
                o.type = 'triangle'; // Звук шкатулки
                o.frequency.setValueAtTime(notes[n % notes.length], audio.currentTime);
                g.gain.setTargetAtTime(0.1, audio.currentTime, 0.05);
                o.connect(g); g.connect(audio.destination);
                o.start(); o.stop(audio.currentTime + 0.25);
                n++;
                
                spawnWin();
                if (navigator.vibrate) navigator.vibrate(40);
            }, 350); // Ритм шкатулки
        }

        function spawnWin() {
            const w = document.createElement('div');
            w.className = 'win';
            w.style.left = Math.random() * (window.innerWidth - 200) + 'px';
            w.style.top = Math.random() * (window.innerHeight - 100) + 'px';
            w.innerHTML = `<div class="head"><span>Error</span><span>X</span></div><div class="body">YOU ARE TASTY</div>`;
            document.body.appendChild(w);
            setTimeout(() => w.remove(), 4000);
        }
    </script>
</body>
</html>
